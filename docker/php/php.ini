; =============================================================================
; PHP INI overrides — development-optimised defaults
; Placed at /usr/local/etc/php/conf.d/99-app.ini inside the container
; =============================================================================

[PHP]
; Memory & timeouts
memory_limit             = 256M
max_execution_time       = 60
max_input_time           = 60
default_socket_timeout   = 60

; Upload limits
upload_max_filesize      = 20M
post_max_size            = 25M
max_file_uploads         = 20

; Error display — show errors locally, suppress in production via env override
display_errors           = On
display_startup_errors   = On
error_reporting          = E_ALL
log_errors               = On
error_log                = /var/www/html/storage/logs/php_errors.log

; Character encoding
default_charset          = "UTF-8"

; Date timezone (override per-app with app.timezone config)
date.timezone            = "UTC"

; Session
session.gc_maxlifetime   = 7200
session.cookie_httponly  = 1
session.cookie_samesite  = "Lax"

; Realpath cache — speeds up file stat calls for autoloader
realpath_cache_size      = 4096K
realpath_cache_ttl       = 600

[opcache]
opcache.enable           = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; In development, validate timestamps so changes take effect immediately.
; Set to 0 in production for maximum performance.
opcache.validate_timestamps = 1
opcache.revalidate_freq  = 0
opcache.fast_shutdown    = 1
