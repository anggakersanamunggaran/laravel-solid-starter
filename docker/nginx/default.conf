server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/html/public;
    index index.php;

    # ---------------------------------------------------------------------------
    # Character set
    # ---------------------------------------------------------------------------
    charset utf-8;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------------------
    # Static asset handling — serve directly, skip PHP for known extensions
    # ---------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|gif|png|svg|ico|css|js|woff|woff2|ttf|eot|map)$ {
        expires    30d;
        access_log off;
        try_files  $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Main Laravel entry point
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------------------------------------------------------
    # PHP-FPM passthrough
    # Service name `app` must match the docker-compose service name.
    # ---------------------------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout       300;
        fastcgi_buffer_size        16k;
        fastcgi_buffers            4 16k;
    }

    # ---------------------------------------------------------------------------
    # Deny access to hidden files (e.g. .env, .git)
    # ---------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ---------------------------------------------------------------------------
    # Logging — override path inside container
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
