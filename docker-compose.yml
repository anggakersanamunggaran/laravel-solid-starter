name: laravel-boilerplate

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # app — PHP 8.2 FPM application server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: runtime
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Mount source code for live-reload in local development.
      # Remove this volume in CI/production builds to use the baked-in image.
      - .:/var/www/html
      # Persist storage outside the container filesystem
      - app_storage:/var/www/html/storage
    environment:
      APP_ENV:      ${APP_ENV:-local}
      APP_DEBUG:    ${APP_DEBUG:-true}
      DB_HOST:      db
      DB_PORT:      3306
      DB_DATABASE:  ${DB_DATABASE:-laravel_boilerplate}
      DB_USERNAME:  ${DB_USERNAME:-laravel}
      DB_PASSWORD:  ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      MAIL_HOST:    mailpit
      MAIL_PORT:    1025
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # webserver — Nginx reverse proxy
  # ---------------------------------------------------------------------------
  webserver:
    image: nginx:1.25-alpine
    container_name: laravel_webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # db — MySQL 8 database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-laravel_boilerplate}
      MYSQL_USER:          ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      # Expose to host for local GUI tools (TablePlus, DBeaver, etc.)
      - "${DB_FORWARD_PORT:-3306}:3306"
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # queue — Laravel queue worker (processes database jobs)
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: runtime
    container_name: laravel_queue
    restart: unless-stopped
    working_dir: /var/www/html
    # Override the default entrypoint — no migrations here, just queue:work
    entrypoint: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage
    environment:
      APP_ENV:         ${APP_ENV:-local}
      APP_KEY:         ${APP_KEY:-}
      DB_HOST:         db
      DB_PORT:         3306
      DB_DATABASE:     ${DB_DATABASE:-laravel_boilerplate}
      DB_USERNAME:     ${DB_USERNAME:-laravel}
      DB_PASSWORD:     ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      MAIL_HOST:       mailpit
      MAIL_PORT:       1025
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - laravel

  # ---------------------------------------------------------------------------
  # mailpit — local SMTP + web UI for testing mail (dev only)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"   # Web UI
      - "1025:1025"                     # SMTP
    networks:
      - laravel

# =============================================================================
# Networks
# =============================================================================
networks:
  laravel:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  db_data:
    driver: local
  app_storage:
    driver: local
